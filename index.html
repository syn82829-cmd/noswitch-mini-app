<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoSwitch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-[#f5f0e8] text-black min-h-screen pb-24">
  <div class="max-w-md mx-auto p-8">
    <!-- Логотип -->
    <div class="flex items-center justify-center gap-3 pt-12">
      <div class="ns-logo">ns</div>
      <div class="relative">
        <div class="w-28 h-14 bg-black rounded-3xl flex items-center px-2">
          <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-xs font-bold border-2 border-black">
            NO
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-6">
      <p class="text-2xl font-semibold tracking-tight">Один VPN. Навсегда.</p>
      <p class="text-zinc-600 mt-3 text-lg">Без переключений.<br>Wildberries + YouTube одновременно</p>
    </div>

    <div class="mt-16 space-y-4">
      <button onclick="buySubscription()" 
              class="w-full bg-black text-white font-semibold py-5 rounded-3xl text-xl tracking-tight active:scale-[0.97] transition">
        Купить подписку — 250 ₽/мес
      </button>

      <button onclick="createVpnAccount()" 
              class="w-full border-2 border-black font-medium py-5 rounded-3xl text-xl tracking-tight active:scale-[0.97] transition">
        Создать аккаунт VPN (тест)
      </button>

      <button onclick="showHowItWorks()" 
              class="w-full border border-zinc-400 text-zinc-700 font-medium py-5 rounded-3xl text-xl tracking-tight active:scale-[0.97] transition">
        Как это работает →
      </button>
    </div>

    <div id="status" class="mt-10 text-center text-sm text-zinc-500"></div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <div class="nav-tabs">
      <div onclick="switchTab(0)" class="nav-item active" id="tab-0">Друзья</div>
      <div onclick="switchTab(1)" class="nav-item" id="tab-1">Бонусы</div>
      <div onclick="switchTab(2)" class="nav-item" id="tab-2">Профили</div>
    </div>

    <!-- Аватарка Telegram справа -->
    <div onclick="openProfile()" class="nav-avatar ml-4" id="user-avatar">
      <!-- Фото подставится автоматически -->
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
